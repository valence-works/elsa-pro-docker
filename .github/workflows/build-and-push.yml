name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
  VERSION: '1.0.0'

jobs:
  prepare:
    name: Extract Elsa Versions
    runs-on: ubuntu-latest
    outputs:
      elsa-server-version: ${{ steps.versions.outputs.elsa-server }}
      elsa-studio-version: ${{ steps.versions.outputs.elsa-studio }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Elsa versions from Directory.Packages.props
        id: versions
        run: |
          elsa_server=$(grep -m1 'Include="Elsa"' Directory.Packages.props | sed 's/.*Version="\([^"]*\)".*/\1/')
          elsa_studio=$(grep -m1 'Include="Elsa.Studio.Core"' Directory.Packages.props | sed 's/.*Version="\([^"]*\)".*/\1/')
          echo "elsa-server=$elsa_server" >> "$GITHUB_OUTPUT"
          echo "elsa-studio=$elsa_studio" >> "$GITHUB_OUTPUT"

  build-and-push-server:
    name: Build & Push ElsaProServer
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/elsa-pro-server
          labels: |
            org.opencontainers.image.title=ElsaProServer
            org.opencontainers.image.description=Elsa Pro Server targeting Elsa ${{ needs.prepare.outputs.elsa-server-version }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}-preview.${{ github.run_number }},enable={{is_default_branch}}
            type=raw,value=elsa-${{ needs.prepare.outputs.elsa-server-version }},enable=${{ github.event_name == 'push' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ElsaProServer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ElsaProServer/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-studio:
    name: Build & Push ElsaProStudio
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/elsa-pro-studio
          labels: |
            org.opencontainers.image.title=ElsaProStudio
            org.opencontainers.image.description=Elsa Pro Studio targeting Elsa ${{ needs.prepare.outputs.elsa-studio-version }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}-preview.${{ github.run_number }},enable={{is_default_branch}}
            type=raw,value=elsa-${{ needs.prepare.outputs.elsa-studio-version }},enable=${{ github.event_name == 'push' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ElsaProStudio
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ElsaProStudio/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-combined:
    name: Build & Push ElsaProCombined
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/elsa-pro-combined
          labels: |
            org.opencontainers.image.title=ElsaProCombined
            org.opencontainers.image.description=Elsa Pro Server and Studio targeting Elsa ${{ needs.prepare.outputs.elsa-server-version }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}-preview.${{ github.run_number }},enable={{is_default_branch}}
            type=raw,value=elsa-${{ needs.prepare.outputs.elsa-server-version }},enable=${{ github.event_name == 'push' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ElsaProCombined
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ElsaProCombined/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
